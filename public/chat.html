<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>aigumi - AI 聊天聚合器</title>
  <link rel="stylesheet" href="chat.css">
</head>
<body>
  <!-- 侧边栏 - 历史消息 -->
  <div id="sidebar" class="sidebar">
    <div id="sidebar-rail" class="sidebar-rail">
      <button id="sidebar-rail-toggle" class="sidebar-rail-toggle" title="打开侧边栏">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" aria-hidden="true" class="icon" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="4" width="18" height="16" rx="4"></rect>
          <path d="M10 4V20"></path>
        </svg>
      </button>
      <button id="sidebar-rail-new-chat" class="sidebar-rail-icon" title="新对话">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" aria-hidden="true" class="icon" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="4"></rect>
          <path d="M8 16L16 8"></path>
          <path d="M14.5 7.5L16.5 9.5"></path>
        </svg>
      </button>
      <button id="sidebar-rail-search" class="sidebar-rail-icon" title="搜索">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" aria-hidden="true" class="icon" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="6"></circle>
          <path d="M20 20L16.65 16.65"></path>
        </svg>
      </button>
      <button id="sidebar-rail-theme" class="sidebar-rail-icon" title="设置">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" aria-hidden="true" class="icon" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.325.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 0 1 1.37.49l1.296 2.247a1.125 1.125 0 0 1-.26 1.431l-1.003.827c-.293.241-.438.613-.43.992a7.723 7.723 0 0 1 0 .255c-.008.378.137.75.43.991l1.004.827c.424.35.534.955.26 1.43l-1.298 2.247a1.125 1.125 0 0 1-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.47 6.47 0 0 1-.22.128c-.331.183-.581.495-.644.869l-.213 1.281c-.09.543-.56.94-1.11.94h-2.594c-.55 0-1.019-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 0 1-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 0 1-1.369-.49l-1.297-2.247a1.125 1.125 0 0 1 .26-1.431l1.004-.827c.292-.24.437-.613.43-.991a6.932 6.932 0 0 1 0-.255c.007-.38-.138-.751-.43-.992l-1.004-.827a1.125 1.125 0 0 1-.26-1.43l1.297-2.247a1.125 1.125 0 0 1 1.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.086.22-.128.332-.183.582-.495.644-.869l.214-1.28Z"></path>
          <path d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"></path>
        </svg>
      </button>
      <div class="sidebar-rail-spacer"></div>
      <div class="sidebar-rail-avatar">T</div>
    </div>

    <div class="sidebar-main">
    <div class="sidebar-header">
      <div class="sidebar-brand">
        <div class="sidebar-title">aigumi</div>
      </div>
      <div class="sidebar-header-actions">
        <button id="settings-toggle" class="settings-trigger" title="设置">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" aria-hidden="true" class="icon" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.325.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 0 1 1.37.49l1.296 2.247a1.125 1.125 0 0 1-.26 1.431l-1.003.827c-.293.241-.438.613-.43.992a7.723 7.723 0 0 1 0 .255c-.008.378.137.75.43.991l1.004.827c.424.35.534.955.26 1.43l-1.298 2.247a1.125 1.125 0 0 1-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.47 6.47 0 0 1-.22.128c-.331.183-.581.495-.644.869l-.213 1.281c-.09.543-.56.94-1.11.94h-2.594c-.55 0-1.019-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 0 1-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 0 1-1.369-.49l-1.297-2.247a1.125 1.125 0 0 1 .26-1.431l1.004-.827c.292-.24.437-.613.43-.991a6.932 6.932 0 0 1 0-.255c.007-.38-.138-.751-.43-.992l-1.004-.827a1.125 1.125 0 0 1-.26-1.43l1.297-2.247a1.125 1.125 0 0 1 1.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.086.22-.128.332-.183.582-.495.644-.869l.214-1.28Z"></path>
            <path d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"></path>
          </svg>
        </button>
        <div id="settings-popover" class="settings-popover">
          <div class="settings-group">
            <div id="settings-provider-title" class="settings-group-title">供应商</div>
            <div id="provider-options" class="provider-options">
              <button class="provider-option active" data-provider="chatgpt" type="button">
                <img class="provider-option-icon" src="./icons/chatgpt.png" alt="" aria-hidden="true">
                <span class="provider-option-indicator" aria-hidden="true"></span>
                <span class="provider-option-label">ChatGPT</span>
              </button>
              <button class="provider-option active" data-provider="gemini" type="button">
                <img class="provider-option-icon" src="./icons/gemini.png" alt="" aria-hidden="true">
                <span class="provider-option-indicator" aria-hidden="true"></span>
                <span class="provider-option-label">Gemini</span>
              </button>
              <button class="provider-option active" data-provider="claude" type="button">
                <img class="provider-option-icon" src="./icons/claude.svg" alt="" aria-hidden="true">
                <span class="provider-option-indicator" aria-hidden="true"></span>
                <span class="provider-option-label">Claude</span>
              </button>
              <button class="provider-option active" data-provider="deepseek" type="button">
                <img class="provider-option-icon" src="./icons/deepseek.svg" alt="" aria-hidden="true">
                <span class="provider-option-indicator" aria-hidden="true"></span>
                <span class="provider-option-label">DeepSeek</span>
              </button>
              <button class="provider-option active" data-provider="kimi" type="button">
                <img class="provider-option-icon" src="./icons/kimi.svg" alt="" aria-hidden="true">
                <span class="provider-option-indicator" aria-hidden="true"></span>
                <span class="provider-option-label">Kimi</span>
              </button>
              <button class="provider-option active" data-provider="doubao" type="button">
                <img class="provider-option-icon" src="./icons/doubao.svg" alt="" aria-hidden="true">
                <span class="provider-option-indicator" aria-hidden="true"></span>
                <span class="provider-option-label">豆包</span>
              </button>
              <button class="provider-option active" data-provider="yiyan" type="button">
                <img class="provider-option-icon" src="./icons/yiyan.svg" alt="" aria-hidden="true">
                <span class="provider-option-indicator" aria-hidden="true"></span>
                <span class="provider-option-label">文心一言</span>
              </button>
              <button class="provider-option active" data-provider="tongyi" type="button">
                <img class="provider-option-icon" src="./icons/tongyi.svg" alt="" aria-hidden="true">
                <span class="provider-option-indicator" aria-hidden="true"></span>
                <span class="provider-option-label">通义千问</span>
              </button>
              <button class="provider-option active" data-provider="perplexity" type="button">
                <img class="provider-option-icon" src="./icons/perplexity.svg" alt="" aria-hidden="true">
                <span class="provider-option-indicator" aria-hidden="true"></span>
                <span class="provider-option-label">Perplexity</span>
              </button>
            </div>
          </div>
          <div class="settings-group">
            <div id="settings-theme-title" class="settings-group-title">主题</div>
            <div id="theme-options" class="settings-options settings-options-theme">
              <button class="theme-option" data-theme="wechat" title="WeChat">WeChat</button>
              <button class="theme-option" data-theme="chatgpt-light" title="ChatGPT 亮色">ChatGPT 亮色</button>
              <button class="theme-option" data-theme="chatgpt-dark" title="ChatGPT 深色">ChatGPT 深色</button>
            </div>
          </div>
          <div class="settings-group">
            <div id="settings-language-title" class="settings-group-title">语言</div>
            <div id="language-options" class="settings-options settings-options-language">
              <button class="language-option" data-language="zh-CN">中</button>
              <button class="language-option" data-language="en">EN</button>
              <button class="language-option" data-language="ja">日</button>
            </div>
          </div>
        </div>
        <button id="sidebar-collapse-btn" class="sidebar-collapse-btn" title="折叠侧边栏">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" aria-hidden="true" class="icon" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="16" rx="4"></rect>
            <path d="M10 4V20"></path>
          </svg>
        </button>
        <button id="close-sidebar" class="sidebar-close">×</button>
      </div>
    </div>

    <div class="sidebar-nav">
      <button id="new-chat" class="sidebar-nav-item sidebar-nav-primary">
        <span class="sidebar-nav-icon" aria-hidden="true">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" class="icon" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="4"></rect>
            <path d="M8 16L16 8"></path>
            <path d="M14.5 7.5L16.5 9.5"></path>
          </svg>
        </span>
        <span id="new-chat-label" class="sidebar-nav-label">新对话</span>
      </button>
      <button id="sidebar-nav-search" class="sidebar-nav-item">
        <span class="sidebar-nav-icon" aria-hidden="true">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" class="icon" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="6"></circle>
            <path d="M20 20L16.65 16.65"></path>
          </svg>
        </span>
        <span id="sidebar-nav-search-label" class="sidebar-nav-label">搜索聊天</span>
      </button>
    </div>

    <div class="sidebar-section">
      <div id="sidebar-section-recent" class="sidebar-section-title">最近</div>
      <div id="history-list" class="history-list"></div>
    </div>

    </div>
  </div>

  <!-- 遮罩层 -->
  <div id="overlay" class="overlay"></div>
  <div id="search-overlay" class="search-overlay" hidden>
    <div id="search-dialog" class="search-dialog" role="dialog" aria-modal="true" aria-labelledby="search-input">
      <div class="search-dialog-header">
        <div class="search-input-wrap">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" aria-hidden="true" class="search-input-icon" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="6"></circle>
            <path d="M20 20L16.65 16.65"></path>
          </svg>
          <input id="search-input" class="search-input" type="search" placeholder="搜索聊天..." autocomplete="off">
        </div>
        <button id="search-close-btn" class="search-close-btn" type="button" title="关闭搜索" aria-label="关闭搜索">×</button>
      </div>
      <div id="search-results" class="search-results">
        <button id="search-new-chat-btn" class="search-new-chat-btn" type="button">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" aria-hidden="true" class="icon" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="4"></rect>
            <path d="M8 16L16 8"></path>
            <path d="M14.5 7.5L16.5 9.5"></path>
          </svg>
          <span id="search-new-chat-label">新对话</span>
        </button>
        <div id="search-history-groups" class="search-history-groups"></div>
      </div>
    </div>
  </div>

  <div id="layout">
    <!-- Left: Chat panel -->
    <div id="chat-panel">
      <header id="header">
        <div class="header-actions">
          <button id="menu-btn" class="menu-btn">☰</button>
        </div>
        <h1>aigumi</h1>
        <div class="header-side">
          <div id="status-bar">
            <span id="status-chatgpt" class="status">⚪ ChatGPT</span>
            <span id="status-gemini" class="status">⚪ Gemini</span>
            <span id="status-claude" class="status">⚪ Claude</span>
            <span id="status-deepseek" class="status">⚪ DeepSeek</span>
            <span id="status-kimi" class="status">⚪ Kimi</span>
            <span id="status-doubao" class="status">⚪ 豆包</span>
            <span id="status-yiyan" class="status">⚪ 文心一言</span>
            <span id="status-tongyi" class="status">⚪ 通义千问</span>
            <span id="status-perplexity" class="status">⚪ Perplexity</span>
          </div>
          <button id="export-chat-btn" class="header-icon-btn" type="button" title="下载对话" aria-label="下载对话">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" aria-hidden="true" class="icon" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 3v11"></path>
              <path d="M8 10.5 12 14.5 16 10.5"></path>
              <path d="M4 17.5V19a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-1.5"></path>
            </svg>
          </button>
        </div>
      </header>

      <main id="messages"></main>

      <footer id="composer">
        <textarea id="input" placeholder="输入问题，同时发给所有启用的 AI..." rows="1"></textarea>
        <button id="send-btn">发送</button>
      </footer>
    </div>

    <div id="panel-resizer" class="panel-resizer" aria-label="调整聊天面板宽度" title="拖动调整宽度"></div>

    <!-- Right: AI iframes -->
    <div id="ai-panel">
      <div id="ai-frame-wrapper-chatgpt" class="ai-frame-wrapper" data-site="chatgpt">
        <div class="ai-frame-header">
          <img class="ai-frame-header-icon" src="./icons/chatgpt.png" alt="ChatGPT">
          <span class="ai-frame-header-text">ChatGPT</span>
        </div>
        <iframe id="frame-chatgpt" src="https://chatgpt.com/"></iframe>
      </div>
      <div id="ai-frame-wrapper-gemini" class="ai-frame-wrapper" data-site="gemini">
        <div class="ai-frame-header">
          <img class="ai-frame-header-icon" src="./icons/gemini.png" alt="Gemini">
          <span class="ai-frame-header-text">Gemini</span>
        </div>
        <iframe id="frame-gemini" src="https://gemini.google.com/app"></iframe>
      </div>
      <div id="ai-frame-wrapper-claude" class="ai-frame-wrapper" data-site="claude">
        <div class="ai-frame-header">
          <img class="ai-frame-header-icon" src="./icons/claude.svg" alt="Claude">
          <span class="ai-frame-header-text">Claude</span>
        </div>
        <iframe id="frame-claude" src="https://claude.ai/new"></iframe>
      </div>
      <div id="ai-frame-wrapper-deepseek" class="ai-frame-wrapper" data-site="deepseek">
        <div class="ai-frame-header">
          <img class="ai-frame-header-icon" src="./icons/deepseek.svg" alt="DeepSeek">
          <span class="ai-frame-header-text">DeepSeek</span>
        </div>
        <iframe id="frame-deepseek" src="https://chat.deepseek.com/"></iframe>
      </div>
      <div id="ai-frame-wrapper-kimi" class="ai-frame-wrapper" data-site="kimi">
        <div class="ai-frame-header">
          <img class="ai-frame-header-icon" src="./icons/kimi.svg" alt="Kimi">
          <span class="ai-frame-header-text">Kimi</span>
        </div>
        <iframe id="frame-kimi" src="https://kimi.moonshot.cn/"></iframe>
      </div>
      <div id="ai-frame-wrapper-doubao" class="ai-frame-wrapper" data-site="doubao">
        <div class="ai-frame-header">
          <img class="ai-frame-header-icon" src="./icons/doubao.svg" alt="豆包">
          <span class="ai-frame-header-text">豆包</span>
        </div>
        <iframe id="frame-doubao" src="https://www.doubao.com/chat/"></iframe>
      </div>
      <div id="ai-frame-wrapper-yiyan" class="ai-frame-wrapper" data-site="yiyan">
        <div class="ai-frame-header">
          <img class="ai-frame-header-icon" src="./icons/yiyan.svg" alt="文心一言">
          <span class="ai-frame-header-text">文心一言</span>
        </div>
        <iframe id="frame-yiyan" src="https://yiyan.baidu.com/"></iframe>
      </div>
      <div id="ai-frame-wrapper-tongyi" class="ai-frame-wrapper" data-site="tongyi">
        <div class="ai-frame-header">
          <img class="ai-frame-header-icon" src="./icons/tongyi.svg" alt="通义千问">
          <span class="ai-frame-header-text">通义千问</span>
        </div>
        <iframe id="frame-tongyi" src="https://tongyi.aliyun.com/qianwen/"></iframe>
      </div>
      <div id="ai-frame-wrapper-perplexity" class="ai-frame-wrapper" data-site="perplexity">
        <div class="ai-frame-header">
          <img class="ai-frame-header-icon" src="./icons/perplexity.svg" alt="Perplexity">
          <span class="ai-frame-header-text">Perplexity</span>
        </div>
        <iframe id="frame-perplexity" src="https://www.perplexity.ai/"></iframe>
      </div>
    </div>
  </div>

  <div id="image-lightbox" class="image-lightbox" hidden aria-hidden="true">
    <div class="image-lightbox-backdrop"></div>
    <div class="image-lightbox-dialog" role="dialog" aria-modal="true" aria-labelledby="image-lightbox-counter">
      <button id="image-lightbox-close" class="image-lightbox-close" type="button" aria-label="关闭">×</button>
      <button id="image-lightbox-prev" class="image-lightbox-nav image-lightbox-prev" type="button" aria-label="上一张">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="m15 18-6-6 6-6"></path>
        </svg>
      </button>
      <div class="image-lightbox-stage">
        <img id="image-lightbox-image" class="image-lightbox-image" alt="">
      </div>
      <button id="image-lightbox-next" class="image-lightbox-nav image-lightbox-next" type="button" aria-label="下一张">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="m9 18 6-6-6-6"></path>
        </svg>
      </button>
      <div id="image-lightbox-counter" class="image-lightbox-counter"></div>
    </div>
  </div>

  <script src="chat.js"></script>
</body>
</html>
